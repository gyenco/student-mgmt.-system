<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management System</title>
    <link rel="stylesheet" href="{{url_for('static', filename='css/style.css')}}">
</head>
<body>
    <h1>Student List</h1>
    <div class="nav">
        <button
          class="btn"
          onclick="window.location.href='{{ url_for('add_student') }}'"
        >
          Add Student
        </button>
        <button class="btn" onclick="window.location.href='{{url_for('home')}}'">
            Home
        </button>
    </div>
    <table border="1">
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Age</th>
            <th>Grade</th>
            <th>Actions</th>
        </tr>

        {% for student in students %}
        <tr>
            <td>{{ student.id }}</td>
            <td>{{ student.name }}</td>
            <td>{{ student.age }}</td>
            <td>{{ student.grade }}</td>
            <td>
                <a href="{{url_for('update_student', id=student.id)}}">Update</a>
                <a href="{{url_for('delete_student', id=student.id)}}">Delete</a>
            </td>
        </tr>

        {% endfor %}
    </table>
</body>
</html>
